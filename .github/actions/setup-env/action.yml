name: Setup

description: Setup Node.js, cache and install dependencies

inputs:
  GITHUB_TOKEN:
    description: 'Github token used to checkout repo'
    default: ${{ github.token }}
  NPM_READ_ONLY_TOKEN:
    description: 'NPM read-only token used to authenticate against the private npm registry'
    required: true

runs:
  using: composite

  steps:
    - name: Set up pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 10

    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 24.9.0
        cache: 'pnpm'

    - name: Set up Git user
      shell: bash
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

    - name: Install dependencies
      shell: bash
      env:
        HUSKY: "0"
        NPM_READ_ONLY_TOKEN: ${{ inputs.NPM_READ_ONLY_TOKEN }}
      run: |
        printf '//registry.npmjs.org/:_authToken=%s\n' "${NPM_READ_ONLY_TOKEN}" >> .npmrc
        pnpm install --registry=https://registry.npmjs.org/