      #     curl -X POST -H 'Content-Type: application/json' \
      #       --data "{
      #         \"text\": \"@pie-frontend :lock: SRI Hashes for v${VERSION}\\n\\nJS: \`${JS_HASH}\`\\nCSS: \`${CSS_HASH}\`\\n\\nJS URL: \`${BASE_URL}/${VERSION}/adyen-platform-experience-web.js\`\\nCSS URL: \`${BASE_URL}/${VERSION}/adyen-platform-experience-web.css\`\\n\\nSee <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|workflow run> for full integration snippets.\"
      #       }" $SLACK_WEBHOOK_URL
