name: Compressed Size

on:
  pull_request:
    branches:
      - main
      - develop
      - group/*

jobs:
  is-pr-approved:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - id: check-approval
        run: gh pr status --json reviews -q '.currentBranch.reviews' | jq '.[]' | jq '.state' | grep APPROVED
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - run: echo ${{ steps.check-approval.outcome == 'success' }}
    outputs:
      approved: ${{ steps.check-approval.outcome == 'success' }}
  build:
    needs: is-pr-approved
    if: needs.is-pr-approved.outputs.approved == 'true'
    permissions:
      contents: read
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.9.0
          cache: 'pnpm'

      - name: Configure npm registry auth
        env:
          NPM_READ_ONLY_TOKEN: ${{ secrets.NPM_READ_ONLY_TOKEN }}
        run: |
          pnpm config set //registry.npmjs.org/:_authToken "${NPM_READ_ONLY_TOKEN}"

      - uses: preactjs/compressed-size-action@v2
        with:
          install-script: "pnpm install --frozen-lockfile"
          repo-token: "${{ secrets.GITHUB_TOKEN }}"
          pattern: "**/dist/**/*.js"
          exclude: "{**/*.map,**/node_modules/**,**/src}"
