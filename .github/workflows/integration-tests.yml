name: Integration Tests

on:
  pull_request_review:
    types: [submitted]
  pull_request:
    types: [synchronize]
    branches:
      - main
      - develop
      - group/*

jobs:
  is-pr-approved:
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - id: check-approval
        run: gh pr status --json reviews -q '.currentBranch.reviews' | jq '.[]' | jq '.state' | grep APPROVED
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - run: echo ${{ steps.check-approval.outcome == 'success' }}
    outputs:
      approved: ${{ steps.check-approval.outcome == 'success' }}

  build-storybook-static:
    needs: is-pr-approved
    if: needs.is-pr-approved.outputs.approved == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CI: true
      PLAYGROUND_HOST: localhost
      PLAYGROUND_PORT: 4173
      PLAYGROUND_URL: http://localhost:4173
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Run the preliminary setup steps
        uses: ./.github/actions/setup-env

      - name: Build Storybook static files
        run: USE_CDN=false TEST_ENV=1 pnpm run storybook:build:preact

      - name: Upload Storybook static artifact
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static-${{ github.sha }}
          path: packages/tools/storybook-preact/storybook-static/
          retention-days: 1

  e2e-local-mocked-api:
    needs:
      - is-pr-approved
      - build-storybook-static
    if: needs.is-pr-approved.outputs.approved == 'true'
    permissions:
      contents: read
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        shard:
          - index: 1
            total: 2
          - index: 2
            total: 2
    env:
      CI: true
      PLAYWRIGHT_WORKERS: 1
      PLAYWRIGHT_WEB_SERVER_COMMAND: pnpm exec vite preview --outDir storybook-static --config vite.config.ts
      PLAYGROUND_HOST: localhost
      PLAYGROUND_PORT: 4173
      PLAYGROUND_URL: http://localhost:4173
    steps:
      - name: Checkout the repo
        uses: actions/checkout@v3

      - name: Run the preliminary setup steps
        uses: ./.github/actions/setup-env

      - name: Download Storybook static artifact
        uses: actions/download-artifact@v4
        with:
          name: storybook-static-${{ github.sha }}
          path: storybook-static

      - name: Run tests (shard ${{ matrix.shard.index }}/${{ matrix.shard.total }})
        run: pnpm run test:integration --shard=${{ matrix.shard.index }}/${{ matrix.shard.total }}

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}-shard-${{ matrix.shard.index }}
          path: playwright-report/
          retention-days: 3