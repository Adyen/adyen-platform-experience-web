packages:
  - "packages/**"

# Single source of truth for shared dependency versions across the workspace.
# The root `pnpm.overrides.preact` references `catalog:` so bumping preact here
# forces every resolution in the tree (including transitive deps like
# @adyen/kyc-components that declare a different exact version) to converge.
catalog:
  preact: ^10.29.1
  vite: ^7.3.2
  vue: ^3.5.13
  webpack: ^5.106.2

overrides:
  "@babel/plugin-transform-modules-systemjs": "7.29.0"
  "@types/node": "24.10.13"
  "axios": "1.15.2"
  "esbuild@0.25.2": "0.27.1"
  "fast-uri": "3.1.2"
  "follow-redirects": "1.16.0"
  "js-yaml@3.14.1": "3.14.2"
  "js-yaml@4.1.0": "4.1.1"
  "lodash": "4.18.1"
  "minimatch@<9.0.7": "10.2.4"
  "picomatch": "4.0.4"
  "postcss": "8.5.12"
  "preact": "catalog:"
  "rollup@4.53.3": "4.59.0"
  "serialize-javascript@6.0.2": "7.0.3"
  "typescript": "5.8.3"
  "uuid": "11.1.0"
  "webpack": "catalog:"

ignoredBuiltDependencies:
  - "core-js"

onlyBuiltDependencies:
  - "esbuild"
  - "msw"
  - "nx"
  - "unrs-resolver"
